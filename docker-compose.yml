name: hookcover

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-covers}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-setup:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_ADMIN_TOKEN: ${VITE_ADMIN_TOKEN:-}
    image: hookcover-app:local
    restart: "no"
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-covers}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "prisma:push"]

  api:
    image: hookcover-app:local
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-covers}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: hookcover-app:local
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-covers}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    command: ["npm", "--workspace", "@covers/worker", "run", "start"]

  bot:
    image: hookcover-app:local
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-covers}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    command: ["npm", "--workspace", "@covers/bot", "run", "start"]

  admin:
    image: hookcover-app:local
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    command:
      [
        "npm",
        "--workspace",
        "@covers/admin",
        "run",
        "preview",
        "--",
        "--host",
        "0.0.0.0",
        "--port",
        "5173"
      ]

volumes:
  postgres-data:
  redis-data:
